services:
  db:
    image: postgres:16-alpine
    container_name: reconator-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reconator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reconator}
      POSTGRES_DB: ${POSTGRES_DB:-reconator}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reconator}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: reconator-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-reconator}:${POSTGRES_PASSWORD:-reconator}@db:5432/${POSTGRES_DB:-reconator}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      TELEGRAM_API_KEY: ${TELEGRAM_API_KEY:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_KIND: ${WEBHOOK_KIND:-generic}
      SENTRY_DSN: ${SENTRY_DSN:-}
      RATE_LIMIT_WRITES: ${RATE_LIMIT_WRITES:-20/minute}
      RATE_LIMIT_BULK: ${RATE_LIMIT_BULK:-5/minute}
      CORS_ORIGINS: "*"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - results:/app/results

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: reconator-worker
    restart: unless-stopped
    command: ["python", "-m", "app.worker"]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-reconator}:${POSTGRES_PASSWORD:-reconator}@db:5432/${POSTGRES_DB:-reconator}
      TELEGRAM_API_KEY: ${TELEGRAM_API_KEY:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_KIND: ${WEBHOOK_KIND:-generic}
      SENTRY_DSN: ${SENTRY_DSN:-}
      WORKER_POLL_INTERVAL_SECONDS: "30"
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - results:/app/results

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: reconator-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  db-data:
  results:
